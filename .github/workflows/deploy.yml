name: Deploy to GitHub Pages

# 推送到 main(或手動觸發)時建置並部署到 GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:

# GitHub Pages 部署所需權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只允許一個部署;不取消進行中的部署,讓它完成
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # 前置:需先在 repo Settings → Pages → Source 選「GitHub Actions」
      # (預設 GITHUB_TOKEN 無權限自動建立 Pages 站台,故此步驟僅讀取設定)
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
