<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="借物之光 落款印">
  <defs>
    <linearGradient id="sealInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d6543f"/>
      <stop offset="1" stop-color="#a8392a"/>
    </linearGradient>
    <linearGradient id="sealGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7c873"/>
      <stop offset="0.5" stop-color="#c9a45c"/>
      <stop offset="1" stop-color="#8a6d2f"/>
    </linearGradient>
    <!-- 新月:象牙圓盤減去偏移圓盤 -->
    <mask id="crescent">
      <rect x="0" y="0" width="100" height="100" fill="black"/>
      <circle cx="48" cy="52" r="23" fill="white"/>
      <circle cx="61" cy="43" r="21" fill="black"/>
    </mask>
  </defs>

  <!-- 印身(朱印泥)+ 金箔外框 -->
  <rect x="6" y="6" width="88" height="88" rx="17" fill="url(#sealInk)" stroke="url(#sealGold)" stroke-width="3.6"/>
  <!-- 內側金線 -->
  <rect x="13.5" y="13.5" width="73" height="73" rx="11.5" fill="none" stroke="#e7c873" stroke-width="1" opacity="0.45"/>

  <!-- 借來的光:新月 -->
  <g mask="url(#crescent)">
    <rect x="0" y="0" width="100" height="100" fill="#f3ead4"/>
  </g>

  <!-- 月之光線(自月缺射出) -->
  <g stroke="#f3ead4" stroke-linecap="round" fill="none">
    <line x1="60" y1="40" x2="80" y2="20" stroke-width="2.4" opacity="0.95"/>
    <line x1="64" y1="46" x2="86" y2="36" stroke-width="2" opacity="0.7"/>
    <line x1="56" y1="34" x2="70" y2="16" stroke-width="1.8" opacity="0.6"/>
  </g>
</svg>
